<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🩺 CareBot - AI Medical Assistant</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:
            radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
            radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
            #0f172a;
            color:white;
            min-height:100vh;
        }

        .chat-container{
            max-width:1100px;
            margin:auto;
            padding:20px;
        }

        .header{
            text-align:center;
            padding:20px;
            margin-bottom:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
        }

        .header h1{
            font-size:2.3rem;
            font-weight:700;
            margin-bottom:8px;
        }

        .header p{
            color:#cbd5e1;
        }

        #chat-box{
            height:65vh;
            overflow-y:auto;
            padding:25px;
            border-radius:25px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
        }

        .message{
            max-width:85%;
            margin-bottom:18px;
            padding:18px;
            border-radius:20px;
            line-height:1.8;
            animation:slideUp .35s ease;
            word-wrap:break-word;
        }

        .user{
            margin-left:auto;
            background:linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );
            box-shadow:0 10px 25px rgba(37,99,235,.35);
        }

        .assistant{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.08);
        }

        .message strong{
            display:block;
            margin-bottom:10px;
            font-size:.95rem;
            opacity:.95;
        }

        .input-section{
            display:flex;
            gap:15px;
            margin-top:20px;
        }

        textarea{
            flex:1;
            border:none;
            outline:none;
            resize:none;
            min-height:70px;
            border-radius:18px;
            padding:18px;
            font-size:1rem;
            background:rgba(255,255,255,.95);
        }

        .send-btn{
            border:none;
            cursor:pointer;
            padding:0 30px;
            border-radius:18px;
            font-weight:600;
            color:white;
            background:linear-gradient(
                135deg,
                #2563eb,
                #06b6d4
            );
            transition:.3s;
        }

        .send-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(59,130,246,.4);
        }

        .clear-btn{
            margin-top:15px;
            border:none;
            padding:12px 20px;
            border-radius:14px;
            cursor:pointer;
            color:white;
            background:linear-gradient(
                135deg,
                #ef4444,
                #dc2626
            );
        }

        .clear-btn:hover{
            opacity:.9;
        }

        .error{
            margin-bottom:15px;
            padding:15px;
            border-radius:15px;
            background:#7f1d1d;
            color:white;
        }

        @keyframes slideUp{
            from{
                opacity:0;
                transform:translateY(15px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        ::-webkit-scrollbar{
            width:8px;
        }

        ::-webkit-scrollbar-thumb{
            background:#475569;
            border-radius:20px;
        }

        @media(max-width:768px){

            .chat-container{
                padding:10px;
            }

            .header h1{
                font-size:1.8rem;
            }

            .input-section{
                flex-direction:column;
            }

            .send-btn{
                width:100%;
                padding:15px;
            }

            .message{
                max-width:100%;
            }

            #chat-box{
                height:60vh;
            }
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        <h1>🩺 CareBot</h1>
        <p>Your AI Medical Knowledge Assistant</p>
    </div>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <div id="chat-box">

        {% for msg in messages %}

        <div class="message {{ msg.role }}">

            <strong>
                {% if msg.role == "user" %}
                    👤 You
                {% else %}
                    🩺 CareBot
                {% endif %}
            </strong>

            {{ msg.content | nl2br }}

        </div>

        {% endfor %}

    </div>

    <form method="post" action="{{ url_for('index') }}">

        <div class="input-section">

            <textarea
                name="prompt"
                placeholder="Ask CareBot a medical question..."
                required></textarea>

            <button
                type="submit"
                class="send-btn">
                🚀 Send
            </button>

        </div>

    </form>

    <form method="get" action="{{ url_for('clear') }}">

        <button
            type="submit"
            class="clear-btn">
            🗑️ Clear Chat
        </button>

    </form>

</div>

<script>

const chatBox = document.getElementById("chat-box");

if(chatBox){
    chatBox.scrollTop = chatBox.scrollHeight;
}

const forms = document.querySelectorAll("form");

if(forms.length > 0){

    forms[0].addEventListener("submit", function(){

        const btn = document.querySelector(".send-btn");

        if(btn){
            btn.innerHTML = "🧠 Thinking...";
            btn.disabled = true;
        }

    });

}

</script>

</body>
</html>
